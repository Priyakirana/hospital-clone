apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-deployment
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: hospital
  template:
    metadata:
      labels:
        app: hospital
    spec:
      containers:
      - name: hospital-container
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        ports:
        - containerPort: 5000

    
        envFrom:
          - configMapRef:
              name: hospital-config
          - secretRef:
              name: hospital-secret

      